<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>CAMPUS_SHARE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
<header class="border-b bg-white/90 backdrop-blur sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
        <a href="/" class="font-bold text-lg tracking-tight text-emerald-700">CAMPUS_SHARE</a>
        <nav class="flex items-center gap-4 text-sm">
            <a href="/products" class="hover:text-emerald-700">商品</a>
            <a href="/publish" class="hover:text-emerald-700" sec:authorize="isAuthenticated()">发布</a>
            <a href="/profile" class="hover:text-emerald-700" sec:authorize="isAuthenticated()">我的</a>
            <a href="/admin" class="hover:text-emerald-700" sec:authorize="hasRole('ADMIN')">管理</a>
            <a href="/login" class="hover:text-emerald-700" sec:authorize="!isAuthenticated()">登录</a>
            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" class="inline">
                <button type="submit" class="hover:text-emerald-700">退出</button>
            </form>
        </nav>
    </div>
</header>

<section class="hero">
    <div class="max-w-6xl mx-auto px-4 py-16 md:py-24">
        <p class="text-emerald-700 font-semibold mb-3">校园二手闲置流转大厅</p>
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-4">CAMPUS_SHARE</h1>
        <p class="text-slate-600 max-w-xl mb-8">把闲置变成下一次相遇。浏览、发布、预约，一站完成校园二手交易。</p>
        <div class="flex flex-wrap gap-3">
            <a href="/products" class="px-5 py-2.5 rounded-lg bg-emerald-700 text-white hover:bg-emerald-800">浏览商品</a>
            <a href="/publish" class="px-5 py-2.5 rounded-lg border border-emerald-700 text-emerald-700 hover:bg-white">我要发布</a>
        </div>
    </div>
</section>

<main class="max-w-6xl mx-auto px-4 py-10">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-semibold">最新上架</h2>
        <a href="/products" class="text-sm text-emerald-700">查看全部</a>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
        <a th:each="p : ${products}" th:href="@{/products/{id}(id=${p.id})}"
           class="bg-white rounded-xl overflow-hidden border border-slate-100 card-hover transition">
            <div class="aspect-[4/3] bg-slate-100">
                <img th:if="${p.first_image}" th:src="${p.first_image}" th:alt="${p.title}" class="w-full h-full object-cover"/>
            </div>
            <div class="p-4">
                <h3 class="font-medium truncate" th:text="${p.title}">标题</h3>
                <p class="text-emerald-700 font-semibold mt-1">¥<span th:text="${p.price}">0</span></p>
                <p class="text-xs text-slate-500 mt-1" th:text="${p.category_name}">分类</p>
            </div>
        </a>
    </div>
    <p th:if="${#lists.isEmpty(products)}" class="text-slate-500">暂无商品，去发布第一件吧。</p>
</main>
<footer class="border-t py-8 text-center text-sm text-slate-500">校园二手闲置 · CAMPUS_SHARE Java</footer>
</body>
</html>
