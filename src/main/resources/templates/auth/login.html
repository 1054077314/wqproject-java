<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${mode == 'register'} ? '注册' : '登录'">登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="min-h-screen hero flex items-center justify-center px-4">
<div class="w-full max-w-md bg-white/90 backdrop-blur rounded-2xl border p-8 shadow-sm">
    <h1 class="text-2xl font-bold text-emerald-700 mb-1">CAMPUS_SHARE</h1>
    <p class="text-slate-500 mb-6" th:text="${mode == 'register'} ? '创建账号' : '欢迎回来'"></p>
    <div th:if="${error}" class="mb-4 text-sm text-rose-700 bg-rose-50 rounded px-3 py-2" th:text="${error}"></div>
    <div th:if="${message}" class="mb-4 text-sm text-emerald-700 bg-emerald-50 rounded px-3 py-2" th:text="${message}"></div>

    <form th:if="${mode != 'register'}" th:action="@{/login}" method="post" class="space-y-4">
        <input name="username" required minlength="3" placeholder="用户名" class="w-full border rounded-lg px-3 py-2"/>
        <input name="password" type="password" required minlength="8" placeholder="密码（至少8位）" class="w-full border rounded-lg px-3 py-2"/>
        <button class="w-full py-2.5 bg-emerald-700 text-white rounded-lg">登录</button>
    </form>
    <form th:if="${mode == 'register'}" th:action="@{/register}" method="post" class="space-y-4">
        <input name="username" required minlength="3" placeholder="用户名" class="w-full border rounded-lg px-3 py-2"/>
        <input name="password" type="password" required minlength="8" placeholder="密码（至少8位）" class="w-full border rounded-lg px-3 py-2"/>
        <button class="w-full py-2.5 bg-emerald-700 text-white rounded-lg">注册</button>
    </form>
    <p class="mt-4 text-sm text-center text-slate-500">
        <a th:if="${mode != 'register'}" href="/register" class="text-emerald-700">没有账号？注册</a>
        <a th:if="${mode == 'register'}" href="/login" class="text-emerald-700">已有账号？登录</a>
    </p>
</div>
</body>
</html>
