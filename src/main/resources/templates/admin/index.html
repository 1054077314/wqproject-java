<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>管理后台 - CAMPUS_SHARE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="min-h-screen bg-slate-50">
<header class="border-b bg-white">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
        <a href="/" class="font-bold text-emerald-700">CAMPUS_SHARE 管理</a>
        <a href="/" class="text-sm">返回前台</a>
    </div>
</header>
<main class="max-w-6xl mx-auto px-4 py-8">
    <div class="flex flex-wrap gap-2 mb-6 text-sm">
        <a th:href="@{/admin(tab=stats)}" th:classappend="${tab=='stats'} ? 'bg-emerald-700 text-white' : 'bg-white'" class="px-3 py-1.5 rounded border">统计</a>
        <a th:href="@{/admin(tab=users)}" th:classappend="${tab=='users'} ? 'bg-emerald-700 text-white' : 'bg-white'" class="px-3 py-1.5 rounded border">用户</a>
        <a th:href="@{/admin(tab=review)}" th:classappend="${tab=='review'} ? 'bg-emerald-700 text-white' : 'bg-white'" class="px-3 py-1.5 rounded border">审核</a>
        <a th:href="@{/admin(tab=categories)}" th:classappend="${tab=='categories'} ? 'bg-emerald-700 text-white' : 'bg-white'" class="px-3 py-1.5 rounded border">分类</a>
    </div>
    <div th:if="${message}" class="mb-3 text-emerald-700" th:text="${message}"></div>
    <div th:if="${error}" class="mb-3 text-rose-700" th:text="${error}"></div>

    <div th:if="${tab=='stats'}" class="grid md:grid-cols-2 gap-6">
        <div class="bg-white border rounded-xl p-5 grid grid-cols-2 gap-4">
            <div><p class="text-sm text-slate-500">用户数</p><p class="text-2xl font-bold" th:text="${stats.total_users}"></p></div>
            <div><p class="text-sm text-slate-500">商品数</p><p class="text-2xl font-bold" th:text="${stats.total_products}"></p></div>
            <div><p class="text-sm text-slate-500">今日新增</p><p class="text-2xl font-bold" th:text="${stats.today_new_products}"></p></div>
            <div><p class="text-sm text-slate-500">待审核</p><p class="text-2xl font-bold" th:text="${stats.pending_products}"></p></div>
        </div>
        <div class="bg-white border rounded-xl p-5">
            <canvas id="statusChart" height="200"></canvas>
        </div>
        <script th:inline="javascript">
            const byStatus = /*[[${stats.products_by_status}]]*/ {};
            const labels = Object.keys(byStatus || {});
            const values = Object.values(byStatus || {});
            new Chart(document.getElementById('statusChart'), {
                type: 'pie',
                data: { labels, datasets: [{ data: values, backgroundColor: ['#047857','#0ea5e9','#f59e0b','#ef4444','#64748b'] }] }
            });
        </script>
    </div>

    <div th:if="${tab=='users'}" class="bg-white border rounded-xl overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-slate-50"><tr><th class="text-left p-3">ID</th><th class="text-left p-3">用户名</th><th class="text-left p-3">状态</th><th class="text-left p-3">操作</th></tr></thead>
            <tbody>
            <tr th:each="u : ${users}" class="border-t">
                <td class="p-3" th:text="${u.id}"></td>
                <td class="p-3" th:text="${u.username}"></td>
                <td class="p-3" th:text="${u.isActive} ? '启用' : '禁用'"></td>
                <td class="p-3">
                    <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post">
                        <input type="hidden" name="isActive" th:value="${!u.isActive}"/>
                        <button class="text-emerald-700" th:text="${u.isActive} ? '禁用' : '启用'"></button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${tab=='review'}" class="space-y-3">
        <div th:each="p : ${pending}" class="bg-white border rounded-lg p-4">
            <p class="font-medium" th:text="${p.title}"></p>
            <p class="text-sm text-slate-500">¥<span th:text="${p.price}"></span> · <span th:text="${p.category_name}"></span></p>
            <div class="mt-3 flex flex-wrap gap-2">
                <form th:action="@{/admin/products/{id}/review(id=${p.id})}" method="post">
                    <input type="hidden" name="action" value="approve"/>
                    <button class="px-3 py-1 bg-emerald-700 text-white rounded text-sm">通过</button>
                </form>
                <form th:action="@{/admin/products/{id}/review(id=${p.id})}" method="post" class="flex gap-2">
                    <input type="hidden" name="action" value="reject"/>
                    <input name="rejectReason" required placeholder="驳回原因" class="border rounded px-2 py-1 text-sm"/>
                    <button class="px-3 py-1 border rounded text-sm">驳回</button>
                </form>
            </div>
        </div>
        <p th:if="${#lists.isEmpty(pending)}" class="text-slate-500">暂无待审核商品</p>
    </div>

    <div th:if="${tab=='categories'}">
        <form th:action="@{/admin/categories}" method="post" class="flex gap-2 mb-4">
            <input name="name" required placeholder="分类名称" class="border rounded px-3 py-2"/>
            <input name="sortOrder" type="number" value="0" class="border rounded px-3 py-2 w-24"/>
            <button class="px-4 py-2 bg-emerald-700 text-white rounded">新增</button>
        </form>
        <div class="bg-white border rounded-xl divide-y">
            <div th:each="c : ${categories}" class="p-3 flex justify-between items-center">
                <span th:text="${c.name} + ' (排序 ' + ${c.sortOrder} + ')'"></span>
                <form th:action="@{/admin/categories/{id}/delete(id=${c.id})}" method="post">
                    <button class="text-rose-600 text-sm">删除</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
