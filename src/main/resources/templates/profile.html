<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>个人中心 - CAMPUS_SHARE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="min-h-screen bg-slate-50">
<header class="border-b bg-white">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
        <a href="/" class="font-bold text-emerald-700">CAMPUS_SHARE</a>
        <span class="text-sm" th:text="${user.username}">user</span>
    </div>
</header>
<main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-4">个人中心</h1>
    <div class="flex flex-wrap gap-2 mb-6 text-sm">
        <a th:href="@{/profile(tab=products)}" th:classappend="${tab=='products'} ? 'bg-emerald-700 text-white' : 'bg-white'" class="px-3 py-1.5 rounded border">我的商品</a>
        <a th:href="@{/profile(tab=buyer)}" th:classappend="${tab=='buyer'} ? 'bg-emerald-700 text-white' : 'bg-white'" class="px-3 py-1.5 rounded border">我的预约</a>
        <a th:href="@{/profile(tab=seller)}" th:classappend="${tab=='seller'} ? 'bg-emerald-700 text-white' : 'bg-white'" class="px-3 py-1.5 rounded border">收到的预约</a>
        <a th:href="@{/profile(tab=favorites)}" th:classappend="${tab=='favorites'} ? 'bg-emerald-700 text-white' : 'bg-white'" class="px-3 py-1.5 rounded border">收藏</a>
    </div>
    <div th:if="${message}" class="mb-3 text-emerald-700" th:text="${message}"></div>
    <div th:if="${error}" class="mb-3 text-rose-700" th:text="${error}"></div>

    <div th:if="${tab=='products'}" class="space-y-3">
        <div th:each="p : ${myProducts}" class="bg-white border rounded-lg p-4 flex justify-between">
            <div>
                <a th:href="@{/products/{id}(id=${p.id})}" class="font-medium" th:text="${p.title}"></a>
                <p class="text-sm text-slate-500">¥<span th:text="${p.price}"></span> · <span th:text="${p.status}"></span></p>
            </div>
            <span class="text-sm text-slate-500">预约 <span th:text="${p.appointment_count}"></span></span>
        </div>
        <p th:if="${#lists.isEmpty(myProducts)}" class="text-slate-500">还没有发布商品</p>
    </div>

    <div th:if="${tab=='buyer' or tab=='seller'}" class="space-y-3">
        <div th:each="a : ${appointments}" class="bg-white border rounded-lg p-4">
            <p class="font-medium" th:text="${a.product_title}"></p>
            <p class="text-sm text-slate-500">¥<span th:text="${a.product_price}"></span> · 买家 <span th:text="${a.buyer_username}"></span> · <span th:text="${a.status}"></span></p>
            <div th:if="${tab=='seller' and a.status=='pending'}" class="mt-2 flex gap-2">
                <form th:action="@{/appointments/{id}/action(id=${a.id})}" method="post">
                    <input type="hidden" name="action" value="confirm"/>
                    <button class="px-3 py-1 bg-emerald-700 text-white rounded text-sm">确认</button>
                </form>
                <form th:action="@{/appointments/{id}/action(id=${a.id})}" method="post">
                    <input type="hidden" name="action" value="reject"/>
                    <button class="px-3 py-1 border rounded text-sm">拒绝</button>
                </form>
            </div>
        </div>
        <p th:if="${#lists.isEmpty(appointments)}" class="text-slate-500">暂无预约</p>
    </div>

    <div th:if="${tab=='favorites'}" class="space-y-3">
        <a th:each="f : ${favorites}" th:href="@{/products/{id}(id=${f.product_id})}" class="block bg-white border rounded-lg p-4">
            <p class="font-medium" th:text="${f.product_title}"></p>
            <p class="text-sm text-emerald-700">¥<span th:text="${f.product_price}"></span></p>
        </a>
        <p th:if="${#lists.isEmpty(favorites)}" class="text-slate-500">暂无收藏</p>
    </div>
</main>
</body>
</html>
