<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>商品列表 - CAMPUS_SHARE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
<header class="border-b bg-white sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
        <a href="/" class="font-bold text-lg text-emerald-700">CAMPUS_SHARE</a>
        <nav class="flex gap-4 text-sm">
            <a href="/products" class="text-emerald-700">商品</a>
            <a href="/publish" sec:authorize="isAuthenticated()">发布</a>
            <a href="/profile" sec:authorize="isAuthenticated()">我的</a>
            <a href="/login" sec:authorize="!isAuthenticated()">登录</a>
        </nav>
    </div>
</header>
<main class="max-w-6xl mx-auto px-4 py-8">
    <form method="get" class="flex flex-wrap gap-3 mb-6">
        <input type="text" name="search" th:value="${search}" placeholder="搜索商品" class="border rounded-lg px-3 py-2 flex-1 min-w-[200px]"/>
        <select name="category_id" class="border rounded-lg px-3 py-2">
            <option value="">全部分类</option>
            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                    th:selected="${categoryId != null and categoryId == c.id}"></option>
        </select>
        <button class="px-4 py-2 bg-emerald-700 text-white rounded-lg">搜索</button>
    </form>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
        <a th:each="p : ${page.results}" th:href="@{/products/{id}(id=${p.id})}"
           class="bg-white rounded-xl overflow-hidden border card-hover transition">
            <div class="aspect-[4/3] bg-slate-100">
                <img th:if="${p.first_image}" th:src="${p.first_image}" class="w-full h-full object-cover" alt=""/>
            </div>
            <div class="p-4">
                <h3 class="font-medium truncate" th:text="${p.title}"></h3>
                <p class="text-emerald-700 font-semibold mt-1">¥<span th:text="${p.price}"></span></p>
            </div>
        </a>
    </div>
    <p th:if="${#lists.isEmpty(page.results)}" class="text-slate-500 mt-8">没有找到商品</p>
    <div class="mt-8 flex gap-3" th:if="${page.count > 0}">
        <a th:if="${page.previous}" th:href="${page.previous}" class="px-3 py-1 border rounded">上一页</a>
        <a th:if="${page.next}" th:href="${page.next}" class="px-3 py-1 border rounded">下一页</a>
    </div>
</main>
</body>
</html>
