server:
  port: 8085

spring:
  application:
    name: campus-share
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mysql}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/data

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
  type-aliases-package: com.campus
  mapper-locations: classpath:mapper/*.xml

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

app:
  media-root: ${MEDIA_ROOT:./media}
  media-url: /media/
  token-expire-days: 7
  page-size: 20
  cors-allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  rate-limit-login-per-minute: ${RATE_LIMIT_LOGIN:20}
  rate-limit-register-per-minute: ${RATE_LIMIT_REGISTER:10}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
          - metrics
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.campus: INFO
